  <circle cx="18" cy="20" r="6" fill="#ff5f57"/><circle cx="38" cy="20" r="6" fill="#febc2e"/><circle cx="58" cy="20" r="6" fill="#28c840"/>
  <text x="410" y="25" text-anchor="middle" fill="#8b949e" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13">AdaptTree — test suite</text>
    <text x="20" y="65" fill="#8b949e" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">$ cd AdaptTree &amp;&amp; ./run_tests.sh</text>  <text x="20" y="85" fill="#e6edf3" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve"></text>  <text x="20" y="105" fill="#3fb950" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">  ✓  Page layer (CRC32, header, serialisation)            22 passed</text>  <text x="20" y="125" fill="#3fb950" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">  ✓  Disk manager (pread/pwrite, alignment)               10 passed</text>  <text x="20" y="145" fill="#3fb950" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">  ✓  EINTR retry correctness                               4 passed</text>  <text x="20" y="165" fill="#3fb950" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">  ✓  Buffer pool (LRU-K eviction, pin/unpin)              11 passed</text>  <text x="20" y="185" fill="#3fb950" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">  ✓  B+ tree (insert, get, delete, scan, split/merge)     39 passed</text>  <text x="20" y="205" fill="#3fb950" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">  ✓  WAL (append, checkpoint, fsync ordering)             34 passed</text>  <text x="20" y="225" fill="#3fb950" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">  ✓  WAL crash recovery                                    1 passed</text>  <text x="20" y="245" fill="#3fb950" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">  ✓  MVCC (snapshot isolation, GC)                        17 passed</text>  <text x="20" y="265" fill="#3fb950" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">  ✓  PGM builder (segment fitting, cone algorithm)         6 passed</text>  <text x="20" y="285" fill="#3fb950" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">  ✓  Learned index end-to-end correctness                  5 passed</text>  <text x="20" y="305" fill="#3fb950" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">  ✓  Learned index boundary conditions                     7 passed</text>  <text x="20" y="325" fill="#3fb950" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">  ✓  MVCC + B+ tree integration                            2 passed</text>  <text x="20" y="345" fill="#3fb950" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">  ✓  Full-stack MVCC integration                           4 passed</text>  <text x="20" y="365" fill="#3fb950" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">  ✓  cmp_count &amp; fallback_count instrumentation            3 passed</text>  <text x="20" y="385" fill="#e6edf3" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve"></text>  <text x="20" y="405" fill="#8b949e" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">────────────────────────────────────────────────────────────────────────</text>  <text x="20" y="425" fill="#3fb950" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">  165 / 165 tests passed   0 failed</text>
</svg>