  <text x="410" y="25" text-anchor="middle" fill="#8b949e" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13">AdaptTree — learned index benchmark</text>
    <text x="20" y="65" fill="#8b949e" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">$ ./build/bench/learned_index_bench --benchmark_repetitions=3 \</text>  <text x="20" y="85" fill="#8b949e" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">       --benchmark_report_aggregates_only=true</text>  <text x="20" y="105" fill="#e6edf3" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve"></text>  <text x="20" y="125" fill="#8b949e" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">Running ./build/bench/learned_index_bench</text>  <text x="20" y="145" fill="#8b949e" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">Run on Linux/WSL2  ·  Release -O2  ·  10,000 keys</text>  <text x="20" y="165" fill="#e6edf3" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve"></text>  <text x="20" y="185" fill="#58a6ff" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">Benchmark                                                ns/op   avg_cmp   fallback</text>  <text x="20" y="205" fill="#8b949e" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">────────────────────────────────────────────────────────────────────────────────</text>  <text x="20" y="225" fill="#e6edf3" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">BM_Lookup/seq/off                                        197.5      5.82          —</text>  <text x="20" y="245" fill="#3fb950" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">BM_Lookup/seq/on                                         165.1      1.23       2.0%</text>  <text x="20" y="265" fill="#e6edf3" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve"></text>  <text x="20" y="285" fill="#e6edf3" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">BM_Lookup/uniform/off                                    307.0      7.34          —</text>  <text x="20" y="305" fill="#3fb950" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">BM_Lookup/uniform/on                                     287.2      7.38       5.8%</text>  <text x="20" y="325" fill="#e6edf3" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve"></text>  <text x="20" y="345" fill="#e6edf3" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">BM_Lookup/zipfian/off                                    236.6      6.16          —</text>  <text x="20" y="365" fill="#d29922" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">BM_Lookup/zipfian/on                                     247.2      5.22      10.9%</text>  <text x="20" y="385" fill="#e6edf3" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve"></text>  <text x="20" y="405" fill="#8b949e" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">────────────────────────────────────────────────────────────────────────────────</text>  <text x="20" y="425" fill="#3fb950" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">Sequential keys:  −16% latency  ·  4.7× fewer comparisons</text>  <text x="20" y="445" fill="#d29922" font-family="Menlo, Monaco, 'Courier New', monospace" font-size="13" xml:space="preserve">Zipfian keys:     +4% regression (10.9% fallback rate — honest result)</text>
